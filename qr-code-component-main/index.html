<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- exibe o site corretamente de acordo com o dispositivo do usuário -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

</head>
<body>

  <main class="container">
    <article class="qr-card">
      <img src="images/image-qr-code.png" alt="QR Code para site do Frontend Mentor" class="qr-image">
      <h1 class="qr-title">Conheça meus projetos no Github</h1>
      <p  class="qr-description">Escaneie o QR Code para acessar meus repositórios e ver meus códigos</p>
    </article>
  </main>
  
  <footer class="attribution">
    Desafio por <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Codificado por <a href="https://github.com/Rael-developer" target="_blank">Israel Tech</a>.
  </footer>
</body>
</html>
